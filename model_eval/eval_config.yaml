# 模型路径配置
model_name_or_path: "Qwen/Qwen2.5-0.5B-Instruct"
adapter_name_or_path: "/mnt/share/wwt/models/Qwen/Qwen2.5-0.5B-Instruct/med/lora_01/best"  # "saves/qwen2.5-0.5B-Instruct/lora/sft"
model_cache: "/mnt/share/wwt/models/Qwen/Qwen2.5-0.5B-Instruct"

# 数据集配置
dataset_path: "datasets/medical/med_test_subset.json"
output_dir: "eval_outputs/qwen2.5-0.5B-Instruct/medical" # pre/post
run_label: "only_lora" # 用于区分不同评估运行的标签，如 "pre" 或 "post"
cutoff_len: 2048

# BERTScore 设置
language: "en"
bertscore_model: "/mnt/share/wwt/models/microsoft/deberta-xlarge-mnli"

# 评估任务开关
eval_ppl: True          # 是否计算困惑度
eval_bleu_rouge: True   # 是否计算传统文本生成指标
eval_semantic: True     # 是否计算语义相似度 (需要额外加载 Embedding 模型)
eval_bertscore: True    # 是否计算 BERTScore

# 语义评估专用配置 (仅当 eval_semantic: True 时生效)
embedding_name_or_path: "Qwen/Qwen3-Embedding-0.6B"
embedding_cache: "/mnt/share/wwt/models/Qwen/Qwen3-Embedding-0.6B"
embed_batch_size: 16
semantic_threshold: 0.5

# SST2 评估专用配置
num_labels: 2
sst2_batch_size: 16